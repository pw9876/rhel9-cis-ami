name: Build AMI

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region to build in
        required: false
        default: eu-west-2
      instance_type:
        description: EC2 instance type for the build
        required: false
        default: t3.medium
      ami_name_prefix:
        description: AMI name prefix
        required: false
        default: rhel9-cis-l2

concurrency:
  group: build-ami
  cancel-in-progress: false

jobs:
  build:
    name: Packer build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC AWS auth

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Set up Python + Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: packer init
        run: packer init packer/rhel9-cis.pkr.hcl

      - name: Install Ansible roles
        run: |
          ansible-galaxy install -r ansible/requirements.yml \
            --roles-path ansible/roles --force

      - name: packer build
        run: |
          packer build \
            -var "aws_region=${{ inputs.aws_region }}" \
            -var "instance_type=${{ inputs.instance_type }}" \
            -var "ami_name_prefix=${{ inputs.ami_name_prefix }}" \
            packer/rhel9-cis.pkr.hcl
        env:
          PACKER_LOG: "1"

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packer-manifest
          path: manifest.json
          if-no-files-found: ignore
