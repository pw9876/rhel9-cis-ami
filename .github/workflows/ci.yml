name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: fast checks (run in parallel) ─────────────────────────────────

  validate:
    name: Packer validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: packer init
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/packer:/workspace" \
            -w /workspace \
            ghcr.io/pw9876/packer-docker:1.15.1 \
            init rhel9-cis.pkr.hcl

      - name: packer fmt check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/packer:/workspace" \
            -w /workspace \
            ghcr.io/pw9876/packer-docker:1.15.1 \
            fmt -check .

      - name: packer validate (syntax only — AWS)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/packer:/workspace" \
            -w /workspace \
            ghcr.io/pw9876/packer-docker:1.15.1 \
            validate -syntax-only rhel9-cis.pkr.hcl

      - name: packer init (local)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/packer/local:/workspace" \
            -w /workspace \
            ghcr.io/pw9876/packer-docker:1.15.1 \
            init rhel9-cis-local.pkr.hcl

      - name: packer fmt check (local)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/packer/local:/workspace" \
            -w /workspace \
            ghcr.io/pw9876/packer-docker:1.15.1 \
            fmt -check .

      - name: packer validate (syntax only — local)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/packer/local:/workspace" \
            -w /workspace \
            ghcr.io/pw9876/packer-docker:1.15.1 \
            validate -syntax-only rhel9-cis-local.pkr.hcl

  lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck scripts/harden.sh

  # ── Tier 2: security / quality (need tier 1 to pass) ──────────────────────

  dependency-scan:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --desc
        continue-on-error: true

  security:
    name: GitGuardian secret scan
    runs-on: ubuntu-latest
    needs: [validate, lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: [validate, lint]
    permissions:
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci

  # ── Tier 3: quality gate ──────────────────────────────────────────────────

  quality:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: [dependency-scan, security, semgrep]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
